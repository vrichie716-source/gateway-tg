name: Gateway TG Bot Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: gateway-tg-bot-runner
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      GROUP_IDS: ${{ secrets.GROUP_IDS }}
      GROUP_NAMES: ${{ secrets.GROUP_NAMES }}
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot loop (~5h45m)
        shell: bash
        run: |
          end=$((SECONDS + 20700))
          while [ $SECONDS -lt $end ]; do
            echo "Starting bot process..."
            python -u bot.py || true
            echo "Bot stopped; restarting in 5s..."
            sleep 5
          done

      - name: Chain next run
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
        run: |
          echo "Dispatching next workflow run to keep bot online..."
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/actions/workflows/bot_runner.yml/dispatches" \
            -d "{\"ref\":\"${GH_REF}\"}" >/dev/null
